<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital Puji Rahayu</title>

    <!-- Meta Tags untuk WhatsApp / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Undangan Digital Puji Rahayu">
    <meta property="og:description" content="Tanpa mengurangi rasa hormat, kami mengundang Bapak/Ibu/Saudara/i untuk hadir dalam acara pernikahan kami.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/HALAMAN%201.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { 
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth;
        }

        body {
            width: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/background%20utama.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            background-color: #000;
            /* Kunci scroll di awal */
            overflow-y: hidden; 
        }

        section {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        .v-section { 
            background: rgba(0, 0, 0, 0.2); 
            display: flex;
        }

        .frame-container {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .media-content {
            height: 100%;
            max-width: 100%;
            object-fit: contain;
            display: block;
            z-index: 1;
        }

        .content {
            position: absolute;
            z-index: 10;
            text-align: center;
            color: #fff;
            width: 80%;
            max-width: 350px;
        }

        .btn { 
            background: #fff; color: #000; padding: 10px 25px; border: none; 
            border-radius: 50px; font-weight: bold; cursor: pointer; 
            margin-top: 15px; display: inline-block; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #countdown { 
            font-size: 1rem; margin: 10px 0; padding: 8px; 
            background: rgba(255,255,255,0.2); border-radius: 10px; 
            backdrop-filter: blur(5px);
        }

        .rek-info { color: #fff; text-shadow: 2px 2px 4px #000; margin-bottom: 10px; font-size: 1.1rem; }
        
        .bank-logo {
            width: 150px;
            margin-bottom: 15px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }

        .wish-container { 
            background: rgba(0, 0, 0, 0.3); padding: 10px; border-radius: 10px; 
            max-height: 120px; overflow-y: auto; margin-top: 10px; text-align: left;
        }
        
        .wish-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px; font-size: 0.8rem; color: #fff; }

        textarea {
            width: 100%; height: 65px; margin-top: 5px; padding: 10px;
            border-radius: 10px; border: 1px solid #000; background: rgba(255,255,255,0.9);
            font-family: inherit;
        }

        @media (min-width: 1024px) {
            .v-section { justify-content: flex-end; padding-right: 5%; }
            .frame-container { width: 50%; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="Lestari.mp3" type="audio/mpeg"></audio>

    <!-- Section Pembuka (Akan dihapus setelah klik) -->
    <section id="welcomeScreen" class="v-section">
        <div class="frame-container">
            <img src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/HALAMAN%201.jpg" class="media-content">
            <div class="content" data-aos="fade-up">
                <h2 id="namaTamu" style="font-size: 2.2rem; text-shadow: 2px 2px 5px #000;">Tamu Undangan</h2>
                <div id="countdown">Memuat...</div>
                <button class="btn" onclick="startUndangan()">BUKA UNDANGAN</button>
            </div>
        </div>
    </section>

    <!-- Konten Utama (Muncul setelah klik) -->
    <div id="mainContent" style="display: none;">
        <section class="v-section"><div class="frame-container"><video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/2.mp4" class="media-content" muted playsinline preload="none"></video></div></section>
        <section class="v-section"><div class="frame-container"><video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/3.mp4" class="media-content" muted playsinline preload="none"></video></div></section>
        
        <section class="v-section">
            <div class="frame-container">
                <video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/4.mp4" class="media-content" muted playsinline preload="none"></video>
                <div class="content" data-aos="zoom-in">
                    <a href="https://maps.app.goo.gl/kFyUXfsqtE4CioL49?g_st=iw" target="_blank" class="btn">LIHAT MAPS</a>
                </div>
            </div>
        </section>

        <section class="v-section"><div class="frame-container"><video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/5.mp4" class="media-content" muted playsinline preload="none"></video></div></section>
        <section class="v-section"><div class="frame-container"><video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/6.mp4" class="media-content" muted playsinline preload="none"></video></div></section>

        <!-- Halaman 7: Gift -->
        <section class="v-section">
            <div class="frame-container">
                <video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/7.mp4" class="media-content" muted playsinline preload="none"></video>
                <div class="content" data-aos="fade-up">
                    <div class="rek-info">
                        <img src="https://raw.githubusercontent.com/Kusuma-Invitation/Templete-3/main/1.png" class="bank-logo" alt="Logo Bank">
                        <p><strong>005701054003504</strong></p>
                        <p>a.n. Puji Rahayu</p>
                    </div>
                    <button class="btn" onclick="copyRek('005701054003504')">SALIN REKENING</button>
                </div>
            </div>
        </section>

        <section class="v-section">
            <div class="frame-container">
                <video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/8.mp4" class="media-content" muted playsinline preload="none"></video>
                <div class="content" data-aos="fade-up">
                    <div class="line-art-container">
                        <textarea id="msg" placeholder="Tuliskan ucapan dan doa Anda..."></textarea>
                        <button class="btn" onclick="sendWish()">KIRIM UCAPAN</button>
                        <div class="wish-container" id="wBox"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="v-section"><div class="frame-container"><video src="https://raw.githubusercontent.com/Kusuma-Invitation/Adat-Jawa/main/9.mp4" class="media-content" muted playsinline preload="none"></video></div></section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({ once: false });

        const firebaseConfig = {
            apiKey: "ISI_API_KEY",
            authDomain: "PROYEK.firebaseapp.com",
            databaseURL: "https://PROYEK.firebaseio.com",
            projectId: "PROYEK",
            storageBucket: "PROYEK.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const wishRef = database.ref('wedding_wishes');

        const urlParams = new URLSearchParams(window.location.search);
        const tamu = urlParams.get('to') || "Tamu Undangan";
        document.getElementById('namaTamu').innerText = tamu;

        const target = new Date("May 28, 2026 00:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const timerEl = document.getElementById('countdown');
            if(timerEl) timerEl.innerText = `${d} Hari ${h}:${m}:${s}`;
        }, 1000);

        function startUndangan() {
            document.getElementById('bgMusic').play();
            
            const main = document.getElementById('mainContent');
            main.style.display = 'block';
            document.body.style.overflowY = 'auto';

            const firstVideoSection = main.querySelector('section');
            firstVideoSection.scrollIntoView({ behavior: 'smooth' });

            setTimeout(() => {
                document.getElementById('welcomeScreen').remove();
                window.scrollTo(0, 0); 
                AOS.refresh();
                observeSections(); 
            }, 800);
        }

        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                const v = e.target.querySelector('video');
                if (v && e.isIntersecting) {
                    v.currentTime = 0; v.play();
                } else if(v) { v.pause(); }
            });
        }, { threshold: 0.6 });
        
        function observeSections() {
            document.querySelectorAll('section').forEach(s => obs.observe(s));
        }
        observeSections();

        function copyRek(n) { 
            navigator.clipboard.writeText(n); 
            alert("Nomor Rekening Puji Rahayu berhasil disalin!"); 
        }
        
        function sendWish() {
            const m = document.getElementById('msg').value;
            if(m.trim() !== "") {
                wishRef.push().set({ nama: tamu, pesan: m });
                document.getElementById('msg').value = "";
            }
        }

        wishRef.on('child_added', (snapshot) => {
            const data = snapshot.val();
            const html = `<div class="wish-item"><strong>${data.nama}:</strong> ${data.pesan}</div>`;
            const wBox = document.getElementById('wBox');
            if(wBox) wBox.insertAdjacentHTML('afterbegin', html);
        });
    </script>
</body>
</html>
